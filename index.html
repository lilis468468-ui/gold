<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>融通金 - 贵金属行情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            background: #262626;
            color: #fff;
            min-height: 100vh;
            font-size: 22px;
        }
        /* 顶部 LOGO 栏 */
        .top-bar {
            background: #2b2b2b;
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }
        .logo-mark {
            width: 54px;
            height: 54px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-mark svg {
            width: 100%;
            height: 100%;
        }
        .logo-texts {
            display: flex;
            flex-direction: column;
            justify-content: center;
            line-height: 1.15;
        }
        .logo-cn {
            font-size: 30px;
            color: #fff;
            font-weight: bold;
            letter-spacing: 3px;
        }
        .logo-en {
            font-size: 13px;
            color: #fff;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .logo-sub {
            font-size: 12px;
            color: #fff;
            margin-top: 2px;
            letter-spacing: 1px;
        }
        .qr-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .qr-code {
            width: 90px;
            height: 90px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 11px;
            text-align: center;
            border: 1px solid #ccc;
        }
        .qr-caption {
            color: #fff;
            font-size: 13px;
        }
        /* 分割线 */
        .divider {
            height: 3px;
            background: #fff;
        }
        /* 状态栏 */
        .status-line {
            background: #2b2b2b;
            padding: 12px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 22px;
        }
        .status-left {
            color: #fff;
        }
        .time-info { color: #ff3b3b; font-weight: 500; }
        .time-info.ok { color: #ff3b3b; }
        /* 促销文字 */
        .promo {
            background: #2b2b2b;
            padding: 10px 0 20px;
            color: #fff;
            font-size: 18px;
            overflow: hidden;
            white-space: nowrap;
        }
        .promo-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 18s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
        /* 表格 */
        .table {
            width: 100%;
            border-collapse: collapse;
        }
        .table th {
            background: #000;
            color: #fff;
            font-size: 26px;
            font-weight: bold;
            padding: 18px 10px;
            text-align: center;
            border: 2px solid #1a1a1a;
        }
        .table td {
            padding: 18px 10px;
            text-align: center;
            font-size: 26px;
            font-weight: 500;
            border: 2px solid #1a1a1a;
        }
        .row-black { background: #000; }
        .row-dark { background: #2b2b2b; }
        .pname { color: #e6a84b; }
        .pup { color: #ff3b3b; }
        .pdown { color: #22c55e; }
        .phl {
            display: flex;
            flex-direction: column;
            gap: 4px;
            line-height: 1.2;
        }
        .phl .high { color: #ff3b3b; }
        .phl .low { color: #22c55e; }
        .hint {
            color: #888;
            padding: 14px 20px 16px;
            text-align: center;
            font-size: 18px;
            background: #2b2b2b;
            border-top: 1px solid #3a3a3a;
        }
        .hint span { color: #ff3b3b; font-weight: bold; }
        .debug {
            color: #555;
            padding: 8px 20px 16px;
            font-size: 11px;
            line-height: 1.6;
            background: #1a1a1a;
        }
        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #3a3a3a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 70px;
            border-top: 1px solid #4a4a4a;
            z-index: 10;
        }
        .nav-item {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
        }
        .nav-item.active { color: #3da3ff; }
        .nav-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }
        .page-padding { height: 80px; }
        @media (max-width: 520px) {
            body { font-size: 18px; }
            .table th { font-size: 20px; padding: 14px 6px; }
            .table td { font-size: 20px; padding: 14px 6px; }
            .logo-cn { font-size: 24px; }
            .logo-mark { width: 44px; height: 44px; }
            .qr-code { width: 70px; height: 70px; }
            .status-line { font-size: 18px; }
            .promo { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">
            <div class="logo-mark">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <path d="M 0 95 L 20 40 L 35 65 L 50 20 L 65 65 L 80 40 L 100 95 Z" fill="none" stroke="#fff" stroke-width="3"/>
                    <text x="10" y="90" font-size="14" fill="#fff" font-weight="bold">PMSP</text>
                </svg>
            </div>
            <div class="logo-texts">
                <div class="logo-cn">融通金</div>
                <div class="logo-en">RONGTONG GOLD</div>
            </div>
        </div>
        <div class="qr-wrap">
            <div class="qr-code">二维码</div>
            <div class="qr-caption">黄金大盘价 扫码购</div>
        </div>
    </div>
    <div class="divider"></div>
    <div class="status-line">
        <span class="status-left"></span>
        <span class="time-info ok" id="timeInfo">加载中...</span>
    </div>
    <div class="promo"><span class="promo-text">★ 大盘价购金条，高纯度、低工费、包邮包保险，买金更省心 ★</span></div>
    <table class="table">
        <thead>
            <tr>
                <th style="width:25%">商品</th>
                <th style="width:25%">回购</th>
                <th style="width:25%">销售</th>
                <th style="width:25%">高/低</th>
            </tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>
    <div class="page-padding"></div>
    <div class="hint" id="priceHint">黄金9999 回购 <span id="hintBuy">--</span> 销售 <span id="hintSell">--</span> | 调整规则: 黄金回购-15 销售+10 | 白银回购-4.5 销售+2 | 铂金回购-25 销售+20</div>
    <div class="debug" id="debugInfo"></div>
    <div class="bottom-nav">
        <div class="nav-item active"><div class="nav-icon">📊</div><div>行情</div></div>
        <div class="nav-item"><div class="nav-icon">📋</div><div>基差</div></div>
        <div class="nav-item"><div class="nav-icon">📰</div><div>资讯</div></div>
        <div class="nav-item"><div class="nav-icon">⚡</div><div>快讯</div></div>
        <div class="nav-item"><div class="nav-icon">🛒</div><div>商城</div></div>
    </div>
    <script>
    const OZ_TO_G = 31.1034768;

    // ============ 融通金基准快照 (XAU=4155.00时的实际价格) ============
    let rongtongSnapshot = {
        xau: 4155.00,
        xag: 64.80,
        xpt: 1668.00,
        xpd: 1263.00,
        rate: 6.78,
        prices: {
            '黄金9999': { buy: 935.10, sell: 936.00 },
            '黄金T+D': { buy: 935.60, sell: 935.77 },
            '黄 金':  { buy: 905.00, sell: 907.00 },
            '白 银':  { buy: 14.350, sell: 14.450 },
            '铂 金':  { buy: 363.00, sell: 364.50 },
            '钯 金':  { buy: 274.50, sell: 276.00 },
            '铑金':   { buy: 1450.00, sell: 1450.00 },
            '铱':     { buy: 1100.0, sell: 1100.0 },
            '钌':     { buy: 240.0,  sell: 240.0 },
            '白银T+D':{ buy: 16429,  sell: 16450 },
            '铂金9995':{ buy: 435.00, sell: 438.20 },
            '美黄金': { buy: 4172.90, sell: 4173.60 },
            '美铂金': { buy: 1668.0, sell: 1669.5 },
            '美钯金': { buy: 1263.5, sell: 1264.5 },
            '美白银': { buy: 64.910, sell: 64.960 },
            '美铑金': { buy: 7800.00, sell: 7800.00 },
            '伦敦金': { buy: 4155.44, sell: 4155.79 },
            '伦敦银': { buy: 64.804, sell: 64.859 },
            '伦敦铂': { buy: 1664.70, sell: 1669.70 },
            '伦敦钯': { buy: 1259.33, sell: 1269.33 },
            '美元':   { buy: 678.00, sell: 678.50 }
        }
    };

    // ============ 商品定义 & 调整规则 ============
    const products = [
        { name: '黄金9999', metal: 'gold',    decimals: 2, buyAdj: -15, sellAdj: 10 },
        { name: '黄金T+D', metal: 'gold',    decimals: 2, buyAdj: -15, sellAdj: 10 },
        { name: '黄 金',   metal: 'gold',    decimals: 2, buyAdj: -15, sellAdj: 10 },
        { name: '白 银',   metal: 'silver',  decimals: 3, buyAdj: -4.5, sellAdj: 2 },
        { name: '铂 金',   metal: 'platinum', decimals: 2, buyAdj: -25, sellAdj: 20 },
        { name: '钯 金',   metal: 'palladium', decimals: 2, buyAdj: 0,  sellAdj: 0 },
        { name: '铑金',    metal: 'gold',    decimals: 2, buyAdj: 0,   sellAdj: 0, constant: true },
        { name: '铱',      metal: 'gold',    decimals: 1, buyAdj: 0,   sellAdj: 0, constant: true },
        { name: '钌',      metal: 'gold',    decimals: 1, buyAdj: 0,   sellAdj: 0, constant: true },
        { name: '白银T+D', metal: 'silver',  decimals: 0, buyAdj: 0,   sellAdj: 0 },
        { name: '铂金9995', metal: 'platinum', decimals: 2, buyAdj: 0, sellAdj: 0 },
        { name: '美黄金',  metal: 'gold',    decimals: 2, buyAdj: 0,   sellAdj: 0, unit: 'oz' },
        { name: '美铂金',  metal: 'platinum', decimals: 1, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美钯金',  metal: 'palladium', decimals: 1, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美白银',  metal: 'silver',  decimals: 3, buyAdj: 0,   sellAdj: 0, unit: 'oz' },
        { name: '美铑金',  metal: 'gold',    decimals: 2, buyAdj: 0,   sellAdj: 0, constant: true },
        { name: '伦敦金',  metal: 'gold',    decimals: 2, buyAdj: 0,   sellAdj: 0, unit: 'oz' },
        { name: '伦敦银',  metal: 'silver',  decimals: 3, buyAdj: 0,   sellAdj: 0, unit: 'oz' },
        { name: '伦敦铂',  metal: 'platinum', decimals: 2, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '伦敦钯',  metal: 'palladium', decimals: 2, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美元',    metal: 'rate',    decimals: 2, buyAdj: 0,   sellAdj: 0 }
    ];

    let prices = { xau: null, xag: null, xpt: null, xpd: null, rate: null };
    let lastPrices = {};
    let lastUpdate = null;
    let errorLog = [];

    // ============ 价格计算核心 ============
    function calcPrice(product) {
        const snap = rongtongSnapshot.prices[product.name];
        if (!snap) return { buy: null, sell: null };

        // 国际商品 (美元/盎司): 直接取当前国际价
        if (product.unit === 'oz') {
            let m;
            if (product.metal === 'gold') m = prices.xau;
            else if (product.metal === 'silver') m = prices.xag;
            else if (product.metal === 'platinum') m = prices.xpt;
            else if (product.metal === 'palladium') m = prices.xpd;
            if (!m) return { buy: snap.buy, sell: snap.sell };
            return { buy: m, sell: m };
        }

        // 美元汇率
        if (product.metal === 'rate' || product.name === '美元') {
            const r = prices.rate || rongtongSnapshot.rate;
            return { buy: r * 100 - 1.5, sell: r * 100 + 1.5 };
        }

        // 常量商品 (铑/铱/钌/美铑): 直接用基准
        if (product.constant) {
            return { buy: snap.buy + (product.buyAdj || 0), sell: snap.sell + (product.sellAdj || 0) };
        }

        // 国内商品 (人民币/克): 融通金基准 + 国际价变动delta + 调整值
        let metalNow, metalSnap;
        if (product.metal === 'gold') { metalNow = prices.xau; metalSnap = rongtongSnapshot.xau; }
        else if (product.metal === 'silver') { metalNow = prices.xag; metalSnap = rongtongSnapshot.xag; }
        else if (product.metal === 'platinum') { metalNow = prices.xpt; metalSnap = rongtongSnapshot.xpt; }
        else if (product.metal === 'palladium') { metalNow = prices.xpd; metalSnap = rongtongSnapshot.xpd; }

        if (!metalNow) return { buy: snap.buy + (product.buyAdj || 0), sell: snap.sell + (product.sellAdj || 0) };

        const rateNow = prices.rate || rongtongSnapshot.rate;
        const delta = (metalNow - metalSnap) * rateNow / OZ_TO_G;
        const buyAdj = product.buyAdj || 0;
        const sellAdj = product.sellAdj || 0;

        return {
            buy: snap.buy + delta + buyAdj,
            sell: snap.sell + delta + sellAdj
        };
    }

    // ============ 渲染 ============
    function render() {
        const body = document.getElementById('dataBody');
        let html = '';
        products.forEach(function(p, i) {
            const result = calcPrice(p);
            const buy = result.buy, sell = result.sell;
            const key = p.name;
            const last = lastPrices[key];
            const bVal = buy != null ? buy.toFixed(p.decimals) : '--';
            const sVal = sell != null ? sell.toFixed(p.decimals) : '--';
            // 高/低: 高=销售价(红), 低=回购价(绿)
            const highVal = sVal;
            const lowVal  = bVal;

            let bCls = '', sCls = '';
            if (last != null && buy != null && last.buy != null) {
                if (buy > last.buy + 0.0005) bCls = 'pup';
                else if (buy < last.buy - 0.0005) bCls = 'pdown';
            }
            if (last != null && sell != null && last.sell != null) {
                if (sell > last.sell + 0.0005) sCls = 'pup';
                else if (sell < last.sell - 0.0005) sCls = 'pdown';
            }

            const rowCls = i % 2 === 0 ? 'row-black' : 'row-dark';
            html += '<tr class="' + rowCls + '">'
                + '<td class="pname">' + p.name + '</td>'
                + '<td class="' + (bCls || '') + '">' + bVal + '</td>'
                + '<td class="' + (sCls || '') + '">' + sVal + '</td>'
                + '<td><div class="phl"><span class="high">' + highVal + '</span><span class="low">' + lowVal + '</span></div></td>'
                + '</tr>';
            lastPrices[key] = { buy: buy, sell: sell };
        });
        body.innerHTML = html;

        // 黄金9999 底部提示
        const gold = calcPrice(products[0]);
        if (gold.buy != null) {
            document.getElementById('hintBuy').textContent = gold.buy.toFixed(2);
            document.getElementById('hintSell').textContent = gold.sell != null ? gold.sell.toFixed(2) : '--';
        }
    }

    // ============ 数据获取 ============
    async function fetchJson(url) {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
    }

    async function mainLoop() {
        let ok = true;
        errorLog = [];
        try {
            // 使用 Coinbase API 获取实时金价 (更可靠)
            const goldData = await fetchJson('https://api.coinbase.com/v2/prices/XAU-USD/spot').catch(function(e) { errorLog.push('金价API'); return null; });
            if (goldData && goldData.data) {
                prices.xau = parseFloat(goldData.data.amount);
            }
            const silverData = await fetchJson('https://api.coinbase.com/v2/prices/XAG-USD/spot').catch(function(e) { return null; });
            if (silverData && silverData.data) {
                prices.xag = parseFloat(silverData.data.amount);
            }
            // 铂金钯金使用 gold-api (可能失败但不影响主要商品)
            const results = await Promise.all([
                fetchJson('https://api.gold-api.com/price/XPT').then(function(d) { return d.price; }).catch(function(e) { return null; }),
                fetchJson('https://api.gold-api.com/price/XPD').then(function(d) { return d.price; }).catch(function(e) { return null; }),
                fetchJson('https://api.exchangerate-api.com/v4/latest/USD').then(function(d) { return d.rates.CNY; }).catch(function(e) { errorLog.push('汇率'); return null; })
            ]);

            const xpt = results[0], xpd = results[1], rate = results[2];
            if (xpt != null) prices.xpt = xpt;
            if (xpd != null) prices.xpd = xpd;
            if (rate != null) prices.rate = rate;
            if (!prices.xau || !prices.rate) ok = false;
        } catch (e) {
            ok = false;
        }

        render();

        const now = new Date();
        const timeStr = now.getFullYear() + '/' +
            String(now.getMonth() + 1).padStart(2, '0') + '/' +
            String(now.getDate()).padStart(2, '0') + ' ' +
            now.getHours().toString().padStart(2, '0') + ':' +
            now.getMinutes().toString().padStart(2, '0') + ':' +
            now.getSeconds().toString().padStart(2, '0');
        const errStr = errorLog.length > 0 ? ' | ' + errorLog.join(' ') + '异常' : ' | 实时';
        document.getElementById('timeInfo').textContent = timeStr + errStr;

        const debugParts = [];
        if (prices.xau != null) debugParts.push('XAU=' + prices.xau.toFixed(2));
        if (prices.xag != null) debugParts.push('XAG=' + prices.xag.toFixed(3));
        if (prices.xag != null) debugParts.push('XPT=' + (prices.xpt || 0).toFixed(1));
        if (prices.xag != null) debugParts.push('XPD=' + (prices.xpd || 0).toFixed(1));
        if (prices.rate != null) debugParts.push('USD/CNY=' + prices.rate.toFixed(4));
        const snap = rongtongSnapshot.prices['黄金9999'];
        const delta = prices.xau != null ? ((prices.xau - rongtongSnapshot.xau) * (prices.rate || rongtongSnapshot.rate) / OZ_TO_G) : 0;
        debugParts.push('黄金基准=(' + snap.buy.toFixed(2) + ') 变动=' + (delta >= 0 ? '+' : '') + delta.toFixed(2) + ' 调整=回购-15销售+10');
        document.getElementById('debugInfo').textContent = debugParts.join('  |  ');
    }

    // 启动: 立即执行一次, 然后每秒刷新
    render();
    mainLoop();
    setInterval(mainLoop, 1000);
    </script>
</body>
</html>
