<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贵金属行情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif; background: #1a1a1a; color: #fff; min-height: 100vh; }
        .header { background: #2a2a2a; padding: 16px; display: flex; align-items: center; justify-content: space-between; }
        .logo-text { font-size: 20px; font-weight: bold; }
        .status-bar { background: #2a2a2a; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .data-source { color: #888; }
        .data-source.ok { color: #00cc66; }
        .data-source.warn { color: #ffaa00; }
        .table-header { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; background: #000; padding: 12px 16px; font-weight: bold; text-align: center; font-size: 16px; }
        .table-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; padding: 14px 16px; text-align: center; border-bottom: 1px solid #3a3a3a; transition: background 0.3s; }
        .product-name { text-align: center; color: #e6a23c; font-size: 18px; }
        .price-buy, .price-sell { font-size: 18px; }
        .price-up { color: #ff4444; }
        .price-down { color: #00cc66; }
        .price-high { color: #ff4444; }
        .price-low { color: #00cc66; }
        .footer { background: #2a2a2a; padding: 16px; font-size: 12px; color: #999; }
        .debug-info { font-size: 10px; color: #666; margin-top: 8px; line-height: 1.8; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #3a3a3a; display: flex; justify-content: space-around; padding: 0; padding-bottom: env(safe-area-inset-bottom); height: 60px; align-items: center; border-top: 1px solid #4a4a4a; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #666; font-size: 10px; flex: 1; height: 100%; justify-content: center; }
        .nav-item.active { color: #40a9ff; }
        .nav-icon { font-size: 24px; margin-bottom: 2px; }
        @media (max-width: 480px) { .product-name, .price-buy, .price-sell { font-size: 16px; } }
        @keyframes flashUp { 0% { background: #2a2a2a; } 50% { background: #3a1515; } 100% { background: #2a2a2a; } }
        @keyframes flashDown { 0% { background: #2a2a2a; } 50% { background: #0a2a0a; } 100% { background: #2a2a2a; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">贵金属行情</div>
    </div>
    <div class="status-bar">
        <span class="data-source" id="dataSource">正在连接数据源...</span>
        <span class="status-text" id="statusText">--</span>
    </div>
    <div class="table-header"><div>商品</div><div>回购</div><div>销售</div><div>高/低</div></div>
    <div id="dataContainer"></div>
    <div class="footer">
        <div>调整规则: 黄金回购-13 销售+18 | 白银回购-4.5 销售+2 | 铂金回购-20 销售+20</div>
        <div class="debug-info" id="debugInfo"></div>
    </div>
    <div style="height: 70px;"></div>
    <div class="bottom-nav">
        <div class="nav-item active"><div class="nav-icon">📈</div><div>行情</div></div>
        <div class="nav-item"><div class="nav-icon">📊</div><div>基差</div></div>
        <div class="nav-item"><div class="nav-icon">📰</div><div>资讯</div></div>
        <div class="nav-item"><div class="nav-icon">⚡</div><div>快讯</div></div>
        <div class="nav-item"><div class="nav-icon">🛒</div><div>商城</div></div>
    </div>

    <script>
    // ============ 常量 ============
    const OZ_TO_G = 31.1034768;

    // ============ 溢价系数 (基于融通金940.50校准) ============
    let premiums = {
        gold: 0.9946,
        silver: 0.9946,
        platinum: 0.9820,
        palladium: 0.9330
    };

    // ============ 商品定义 ============
    const products = [
        { name: '黄金9999', metal: 'gold', buyAdj: -13, sellAdj: 18, decimals: 2 },
        { name: '黄金T+D', metal: 'gold', buyAdj: -13, sellAdj: 18, decimals: 2, offset: -0.8 },
        { name: '黄 金', metal: 'gold', buyAdj: -13, sellAdj: 18, decimals: 2, offset: 1.0 },
        { name: '白 银', metal: 'silver', buyAdj: -4.5, sellAdj: 2, decimals: 3 },
        { name: '铂 金', metal: 'platinum', buyAdj: -20, sellAdj: 20, decimals: 2 },
        { name: '钯 金', metal: 'palladium', buyAdj: 0, sellAdj: 0, decimals: 2 },
        { name: '铑金', metal: 'gold', buyAdj: 0, sellAdj: 0, decimals: 2, constant: 1450.00 },
        { name: '铱', metal: 'gold', buyAdj: 0, sellAdj: 0, decimals: 1, constant: 1100.0 },
        { name: '钌', metal: 'gold', buyAdj: 0, sellAdj: 0, decimals: 1, constant: 240.0 },
        { name: '白银T+D', metal: 'silver', buyAdj: 0, sellAdj: 0, decimals: 0, unit: 'kg' },
        { name: '铂金9995', metal: 'platinum', buyAdj: -20, sellAdj: 20, decimals: 2, offset: -5.0 },
        { name: '美黄金', metal: 'gold', buyAdj: 0, sellAdj: 0, decimals: 2, unit: 'oz' },
        { name: '美铂金', metal: 'platinum', buyAdj: 0, sellAdj: 0, decimals: 1, unit: 'oz' },
        { name: '美钯金', metal: 'palladium', buyAdj: 0, sellAdj: 0, decimals: 1, unit: 'oz' },
        { name: '美白银', metal: 'silver', buyAdj: 0, sellAdj: 0, decimals: 3, unit: 'oz' },
        { name: '美铑金', metal: 'gold', buyAdj: 0, sellAdj: 0, decimals: 2, constant: 7800.0 },
        { name: '伦敦金', metal: 'gold', buyAdj: 0, sellAdj: 0, decimals: 2, unit: 'oz', lmeFactor: 0.995 },
        { name: '伦敦银', metal: 'silver', buyAdj: 0, sellAdj: 0, decimals: 3, unit: 'oz', lmeFactor: 0.999 },
        { name: '伦敦铂', metal: 'platinum', buyAdj: 0, sellAdj: 0, decimals: 2, unit: 'oz' },
        { name: '伦敦钯', metal: 'palladium', buyAdj: 0, sellAdj: 0, decimals: 2, unit: 'oz' },
        { name: '美元', metal: 'rate', buyAdj: 0, sellAdj: 0, decimals: 2 }
    ];

    // ============ 状态 ============
    let lastPrices = {};
    let prices = { xau: null, xag: null, xpt: null, xpd: null, rate: 6.77 };
    let lastUpdate = null;
    let errorLog = [];
    let failCount = 0;

    // ============ 价格计算 ============
    function calcPrice(product) {
        if (product.constant) {
            return { buy: product.constant, sell: product.constant };
        }

        if (product.metal === 'rate') {
            const v = (prices.rate || 6.77) * 100;
            return { buy: v - 1.5, sell: v + 1.5 };
        }

        let metalUsd = null;
        let premium = 1.0;
        if (product.metal === 'gold') { metalUsd = prices.xau; premium = premiums.gold; }
        else if (product.metal === 'silver') { metalUsd = prices.xag; premium = premiums.silver; }
        else if (product.metal === 'platinum') { metalUsd = prices.xpt; premium = premiums.platinum; }
        else if (product.metal === 'palladium') { metalUsd = prices.xpd; premium = premiums.palladium; }

        if (!metalUsd) return { buy: null, sell: null };

        if (product.unit === 'oz') {
            let factor = product.lmeFactor || 1.0;
            const v = metalUsd * (prices.rate || 6.77) * factor;
            return { buy: v, sell: v };
        }

        let base = metalUsd * (prices.rate || 6.77) / OZ_TO_G * premium;
        if (product.offset) base = base + product.offset;
        return { buy: base, sell: base };
    }

    // ============ 渲染 ============
    function render() {
        const container = document.getElementById('dataContainer');
        let html = '';
        const hasData = prices.xau !== null;

        products.forEach(product => {
            const p = calcPrice(product);

            let buy = p.buy;
            let sell = p.sell;

            if (product.name === '白银T+D' && buy !== null) {
                buy = buy * 1000;
                sell = sell * 1000;
            }

            const adjBuy = buy !== null ? buy + product.buyAdj : null;
            const adjSell = sell !== null ? sell + product.sellAdj : null;

            let buyStr = '--';
            let sellStr = '--';
            let highStr = '--';
            let lowStr = '--';

            if (adjBuy !== null) {
                buyStr = adjBuy.toFixed(product.decimals);
                sellStr = adjSell.toFixed(product.decimals);
                highStr = (adjSell * 1.002).toFixed(product.decimals);
                lowStr = (adjBuy * 0.998).toFixed(product.decimals);
            }

            let buyClass = '';
            const last = lastPrices[product.name];
            if (last !== undefined && adjBuy !== null && Math.abs(adjBuy - last) > 0.0001) {
                if (adjBuy > last) buyClass = ' price-up';
                else if (adjBuy < last) buyClass = ' price-down';
            }
            if (adjBuy !== null) lastPrices[product.name] = adjBuy;

            html += '<div class="table-row">' +
                '<div class="product-name">' + product.name + '</div>' +
                '<div class="price-buy' + buyClass + '">' + buyStr + '</div>' +
                '<div class="price-sell">' + sellStr + '</div>' +
                '<div><span class="price-high">' + highStr + '</span><br><span class="price-low">' + lowStr + '</span></div>' +
            '</div>';
        });

        container.innerHTML = html;
    }

    // ============ 获取单个金属价格 ============
    async function fetchMetal(symbol) {
        try {
            const r = await fetch('https://api.gold-api.com/price/' + symbol, { cache: 'no-store', mode: 'cors' });
            if (r.ok) {
                const d = await r.json();
                if (d && typeof d.price === 'number' && d.price > 0) return d.price;
                if (d && d.error) errorLog.push(symbol + ':' + d.error);
            }
        } catch (e) {
            errorLog.push(symbol + ':' + e.message);
        }
        return null;
    }

    // ============ 获取汇率 ============
    async function fetchRate() {
        const urls = [
            'https://api.exchangerate-api.com/v4/latest/USD',
            'https://open.er-api.com/v6/latest/USD'
        ];
        for (let i = 0; i < urls.length; i++) {
            try {
                const r = await fetch(urls[i] + '?t=' + Date.now(), { cache: 'no-store', mode: 'cors' });
                if (r.ok) {
                    const d = await r.json();
                    if (d && d.rates && d.rates.CNY) return d.rates.CNY;
                }
            } catch (e) {
                errorLog.push('RATE:' + e.message);
            }
        }
        return null;
    }

    // ============ 主数据获取 ============
    async function fetchPrices() {
        errorLog = [];
        const results = await Promise.allSettled([
            fetchMetal('XAU'),
            fetchMetal('XAG'),
            fetchMetal('XPT'),
            fetchMetal('XPD'),
            fetchRate()
        ]);

        let gotAny = false;
        const xau = results[0].status === 'fulfilled' ? results[0].value : null;
        const xag = results[1].status === 'fulfilled' ? results[1].value : null;
        const xpt = results[2].status === 'fulfilled' ? results[2].value : null;
        const xpd = results[3].status === 'fulfilled' ? results[3].value : null;
        const rate = results[4].status === 'fulfilled' ? results[4].value : null;

        if (xau) { prices.xau = xau; gotAny = true; }
        if (xag) prices.xag = xag;
        if (xpt) prices.xpt = xpt;
        if (xpd) prices.xpd = xpd;
        if (rate) prices.rate = rate;

        lastUpdate = new Date();
        if (gotAny) failCount = 0; else failCount++;
        return gotAny;
    }

    // ============ 状态更新 ============
    function updateStatus(source, time, cls) {
        document.getElementById('statusText').textContent = time;
        const ds = document.getElementById('dataSource');
        ds.textContent = source;
        ds.className = 'data-source ' + (cls || '');
    }

    // ============ 主循环 ============
    async function mainLoop() {
        const ok = await fetchPrices();
        render();

        const timeStr = lastUpdate.toLocaleString('zh-CN', { hour12: false });

        if (ok) {
            const goldBase = (prices.xau * (prices.rate || 6.77) / OZ_TO_G * premiums.gold).toFixed(2);
            const debug = 'XAU=' + (prices.xau || '?') + '$/oz | USD/CNY=' + (prices.rate || '?') + ' | 黄金基准=' + goldBase + '元/克 | 溢价=' + premiums.gold.toFixed(4) + (failCount > 0 ? ' | 重试=' + failCount : '') + (errorLog.length ? ' | 错误:' + errorLog.join(',') : '');
            document.getElementById('debugInfo').textContent = debug;
            updateStatus('实时行情 · 更新于', timeStr, 'ok');
        } else if (prices.xau !== null) {
            const goldBase = (prices.xau * (prices.rate || 6.77) / OZ_TO_G * premiums.gold).toFixed(2);
            document.getElementById('debugInfo').textContent = '[使用缓存数据] XAU=' + prices.xau + ' | 黄金基准=' + goldBase + '元/克 | 错误:' + errorLog.join(',');
            updateStatus('连接失败 · 使用缓存数据 · 上次更新于', timeStr, 'warn');
        } else {
            document.getElementById('debugInfo').textContent = '无法获取数据，请检查网络连接。错误:' + errorLog.join(',');
            updateStatus('数据加载失败，请稍后刷新', timeStr, 'warn');
        }
    }

    // ============ 初始化 ============
    render();
    mainLoop();
    setInterval(mainLoop, 5000);
    </script>
</body>
</html>
