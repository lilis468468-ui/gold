<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>融通金 - 贵金属行情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #1f1f1f;
            color: #fff;
            min-height: 100vh;
        }
        /* 顶部 LOGO */
        .top-bar {
            background: #2b2b2b;
            padding: 14px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { display: flex; align-items: center; gap: 14px; }
        .logo-mark {
            width: 54px; height: 54px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 28px; font-weight: bold;
        }
        .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
        .logo-cn { font-size: 30px; color: #fff; font-weight: bold; letter-spacing: 3px; }
        .logo-en { font-size: 13px; color: #fff; letter-spacing: 2px; margin-top: 2px; }
        .qr-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .qr-code {
            width: 90px; height: 90px;
            background: #fff; color: #000;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; text-align: center;
        }
        .qr-caption { color: #fff; font-size: 13px; }

        /* 状态栏 */
        .status-line {
            background: #2b2b2b;
            padding: 12px 22px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 22px;
        }
        .time-info { color: #ff3b3b; font-weight: 500; }

        /* 促销滚动文字 */
        .promo {
            background: #2b2b2b;
            padding: 10px 0 20px;
            font-size: 18px;
            overflow: hidden; white-space: nowrap;
        }
        .promo-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
            color: #fff;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }

        /* 表格 */
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th {
            background: #000;
            color: #fff;
            font-size: 26px;
            font-weight: bold;
            padding: 18px 10px;
            text-align: center;
            border: 2px solid #1a1a1a;
        }
        table td {
            padding: 18px 10px;
            text-align: center;
            font-size: 26px;
            font-weight: 500;
            border: 2px solid #1a1a1a;
        }
        tr.row-dark { background: #2b2b2b; }
        tr.row-black { background: #000; }
        td.pname { color: #e6a84b; text-align: left; padding-left: 30px; font-size: 26px; }
        td.pup { color: #ff3b3b; }
        td.pdown { color: #22c55e; }
        td.highlow { display: flex; flex-direction: column; gap: 4px; line-height: 1.2; }
        td.highlow .h { color: #ff3b3b; }
        td.highlow .l { color: #22c55e; }

        /* 提示行 */
        .hint {
            color: #e6a84b;
            padding: 14px 20px 16px;
            text-align: center;
            font-size: 18px;
            background: #2b2b2b;
            border-top: 1px solid #3a3a3a;
            font-weight: 500;
        }
        .hint span { color: #ff3b3b; font-weight: bold; margin: 0 4px; }
        .debug {
            color: #666; padding: 8px 20px 80px;
            font-size: 12px; line-height: 1.6; background: #1a1a1a;
        }

        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #3a3a3a;
            display: flex; justify-content: space-around; align-items: center;
            height: 70px;
            border-top: 1px solid #4a4a4a;
            z-index: 10;
        }
        .nav-item {
            flex: 1; height: 100%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #fff; font-size: 14px;
        }
        .nav-item.active { color: #409eff; }
        .nav-icon { font-size: 28px; margin-bottom: 4px; }

        @media (max-width: 520px) {
            table th, table td { font-size: 18px; padding: 14px 8px; }
            td.pname { padding-left: 14px; font-size: 18px; }
            .logo-cn { font-size: 22px; }
            .logo-mark { width: 40px; height: 40px; font-size: 20px; }
            .qr-code { width: 60px; height: 60px; }
            .status-line { font-size: 18px; padding: 10px 16px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">
            <div class="logo-mark">金</div>
            <div class="logo-text">
                <div class="logo-cn">融通金</div>
                <div class="logo-en">RONGTONG GOLD</div>
            </div>
        </div>
        <div class="qr-wrap">
            <div class="qr-code">扫码查看</div>
            <div class="qr-caption">黄金大盘价</div>
        </div>
    </div>

    <div class="status-line">
        <span></span>
        <span class="time-info" id="timeInfo">加载中...</span>
    </div>

    <div class="promo"><span class="promo-text">★ 大盘价购金条，高纯度、低工费、包邮包保险，买金更省心 ★</span></div>

    <table>
        <thead>
            <tr>
                <th style="width:25%">商品</th>
                <th style="width:25%">回购</th>
                <th style="width:25%">销售</th>
                <th style="width:25%">高/低</th>
            </tr>
        </thead>
        <tbody id="dataBody"></tbody>
    </table>

    <div style="height:80px"></div>
    <div class="hint" id="priceHint">黄金9999 回购 <span id="hintBuy">--</span> 销售 <span id="hintSell">--</span></div>
    <div class="debug" id="debugInfo"></div>

    <div class="bottom-nav">
        <div class="nav-item active"><div class="nav-icon">📊</div><div>行情</div></div>
        <div class="nav-item"><div class="nav-icon">📋</div><div>基差</div></div>
        <div class="nav-item"><div class="nav-icon">📰</div><div>资讯</div></div>
        <div class="nav-item"><div class="nav-icon">⚡</div><div>快讯</div></div>
        <div class="nav-item"><div class="nav-icon">🛒</div><div>商城</div></div>
    </div>

    <script>
    const OZ_TO_G = 31.1034768;

    // ============ 融通金基准快照 (用于 delta 计算) ============
    // 基准快照: XAU=4156.70 汇率=6.775 对应商品基准价
    // 如需重新校准: 修改以下值即可
    let rongtongSnapshot = {
        xau: 4156.70,
        xag: 64.961,
        xpt: 1674.0,
        xpd: 1280.0,
        rate: 6.775,
        prices: {
            '黄金9999': { buy: 902.30, sell: 902.82 },
            '黄金T+D': { buy: 901.87, sell: 902.05 },
            '黄 金':  { buy: 899.67, sell: 901.67 },
            '白 银':  { buy: 14.381, sell: 14.481 },
            '铂 金':  { buy: 357.39, sell: 358.89 },
            '钯 金':  { buy: 275.64, sell: 277.14 },
            '铑金':   { buy: 1450.00, sell: 1450.00 },
            '铱':     { buy: 1100.0, sell: 1100.0 },
            '钌':     { buy: 240.0,  sell: 240.0 },
            '白银T+D':{ buy: 16758,  sell: 16765 },
            '铂金9995':{ buy: 417.79, sell: 420.99 },
            '美黄金': { buy: 4156.70, sell: 4156.70 },
            '美铂金': { buy: 1674.0, sell: 1674.0 },
            '美钯金': { buy: 1280.0, sell: 1280.0 },
            '美白银': { buy: 64.961, sell: 64.961 },
            '美铑金': { buy: 7800.00, sell: 7800.00 },
            '伦敦金': { buy: 4156.70, sell: 4156.70 },
            '伦敦银': { buy: 64.961, sell: 64.961 },
            '伦敦铂': { buy: 1674.00, sell: 1674.00 },
            '伦敦钯': { buy: 1280.00, sell: 1280.00 },
            '美元':   { buy: 677.50, sell: 680.50 }
        }
    };

    // ============ 商品定义 & 调整规则 ============
    // buyAdj: 回购价调整量  sellAdj: 销售价调整量
    const products = [
        { name: '黄金9999', metal: 'gold',    decimals: 2, buyAdj: -15, sellAdj: +10 },
        { name: '黄金T+D', metal: 'gold',    decimals: 2, buyAdj: -15, sellAdj: +10 },
        { name: '黄 金',   metal: 'gold',    decimals: 2, buyAdj: -15, sellAdj: +10 },
        { name: '白 银',   metal: 'silver',  decimals: 3, buyAdj: -4.5, sellAdj: +2 },
        { name: '铂 金',   metal: 'platinum', decimals: 2, buyAdj: -25, sellAdj: +20 },
        { name: '钯 金',   metal: 'palladium', decimals: 2, buyAdj: 0, sellAdj: 0 },
        { name: '铑金',    metal: 'gold',    decimals: 2, buyAdj: 0, sellAdj: 0, constant: true },
        { name: '铱',      metal: 'gold',    decimals: 1, buyAdj: 0, sellAdj: 0, constant: true },
        { name: '钌',      metal: 'gold',    decimals: 1, buyAdj: 0, sellAdj: 0, constant: true },
        { name: '白银T+D', metal: 'silver',  decimals: 0, buyAdj: 0, sellAdj: 0 },
        { name: '铂金9995', metal: 'platinum', decimals: 2, buyAdj: 0, sellAdj: 0 },
        { name: '美黄金',  metal: 'gold',    decimals: 2, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美铂金',  metal: 'platinum', decimals: 1, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美钯金',  metal: 'palladium', decimals: 1, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美白银',  metal: 'silver',  decimals: 3, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美铑金',  metal: 'gold',    decimals: 2, buyAdj: 0, sellAdj: 0, constant: true },
        { name: '伦敦金',  metal: 'gold',    decimals: 2, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '伦敦银',  metal: 'silver',  decimals: 3, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '伦敦铂',  metal: 'platinum', decimals: 2, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '伦敦钯',  metal: 'palladium', decimals: 2, buyAdj: 0, sellAdj: 0, unit: 'oz' },
        { name: '美元',    metal: 'rate',    decimals: 2, buyAdj: 0, sellAdj: 0 }
    ];

    let prices = { xau: null, xag: null, xpt: null, xpd: null, rate: null };
    let lastPrices = {};
    let fetchErrors = {};

    // ============ 价格计算核心 ============
    function calcPrice(product) {
        const snap = rongtongSnapshot.prices[product.name];
        if (!snap) return { buy: null, sell: null };

        // 国际商品 (美元/盎司): 直接取当前国际价
        if (product.unit === 'oz') {
            let m = null;
            if (product.metal === 'gold') m = prices.xau;
            else if (product.metal === 'silver') m = prices.xag;
            else if (product.metal === 'platinum') m = prices.xpt;
            else if (product.metal === 'palladium') m = prices.xpd;
            if (m == null) m = snap.buy; // 回退基准
            return { buy: m, sell: m };
        }

        // 美元汇率
        if (product.metal === 'rate' || product.name === '美元') {
            const r = prices.rate != null ? prices.rate : rongtongSnapshot.rate;
            return { buy: r * 100 - 1.5, sell: r * 100 + 1.5 };
        }

        // 常量商品 (铑/铱/钌/美铑): 直接用基准
        if (product.constant) {
            return { buy: snap.buy, sell: snap.sell };
        }

        // 国内商品 (人民币/克): 融通金基准 + 国际价变动delta + 用户调整
        let metalNow, metalSnap;
        if (product.metal === 'gold') { metalNow = prices.xau; metalSnap = rongtongSnapshot.xau; }
        else if (product.metal === 'silver') { metalNow = prices.xag; metalSnap = rongtongSnapshot.xag; }
        else if (product.metal === 'platinum') { metalNow = prices.xpt; metalSnap = rongtongSnapshot.xpt; }
        else if (product.metal === 'palladium') { metalNow = prices.xpd; metalSnap = rongtongSnapshot.xpd; }

        const rateNow = prices.rate != null ? prices.rate : rongtongSnapshot.rate;
        let delta = 0;
        if (metalNow != null && metalSnap != null) {
            delta = (metalNow - metalSnap) * rateNow / OZ_TO_G;
        }

        return {
            buy: snap.buy + delta + (product.buyAdj || 0),
            sell: snap.sell + delta + (product.sellAdj || 0)
        };
    }

    // ============ 渲染 ============
    function render() {
        const body = document.getElementById('dataBody');
        let html = '';
        products.forEach((p, i) => {
            const { buy, sell } = calcPrice(p);
            const key = p.name;
            const last = lastPrices[key];
            const bVal = buy != null ? buy.toFixed(p.decimals) : '--';
            const sVal = sell != null ? sell.toFixed(p.decimals) : '--';

            let bCls = '', sCls = '';
            if (last && last.buy != null && buy != null) {
                if (buy > last.buy + 0.0005) bCls = 'pup';
                else if (buy < last.buy - 0.0005) bCls = 'pdown';
            }
            if (last && last.sell != null && sell != null) {
                if (sell > last.sell + 0.0005) sCls = 'pup';
                else if (sell < last.sell - 0.0005) sCls = 'pdown';
            }

            const rowCls = i % 2 === 0 ? 'row-black' : 'row-dark';
            html += `<tr class="${rowCls}">`
                + `<td class="pname">${p.name}</td>`
                + `<td class="${bCls}">${bVal}</td>`
                + `<td class="${sCls}">${sVal}</td>`
                + `<td><div class="highlow"><span class="h">${sVal}</span><span class="l">${bVal}</span></div></td>`
                + `</tr>`;
            lastPrices[key] = { buy, sell };
        });
        body.innerHTML = html;

        // 更新顶部黄金9999提示
        const gold = calcPrice(products[0]);
        if (gold.buy != null) {
            document.getElementById('hintBuy').textContent = gold.buy.toFixed(2);
            document.getElementById('hintSell').textContent = gold.sell != null ? gold.sell.toFixed(2) : '--';
        }
    }

    // ============ 数据获取 ============
    async function fetchJson(url) {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
    }

    async function mainLoop() {
        let ok = true;
        fetchErrors = {};

        try {
            const results = await Promise.allSettled([
                fetchJson('https://api.gold-api.com/price/XAU'),
                fetchJson('https://api.gold-api.com/price/XAG'),
                fetchJson('https://api.gold-api.com/price/XPT'),
                fetchJson('https://api.gold-api.com/price/XPD'),
                fetchJson('https://api.exchangerate-api.com/v4/latest/USD')
            ]);

            if (results[0].status === 'fulfilled') {
                prices.xau = results[0].value.price != null ? results[0].value.price : results[0].value.buy;
            } else { fetchErrors.XAU = true; ok = false; }

            if (results[1].status === 'fulfilled') {
                prices.xag = results[1].value.price != null ? results[1].value.price : results[1].value.buy;
            } else { fetchErrors.XAG = true; }

            if (results[2].status === 'fulfilled') {
                prices.xpt = results[2].value.price != null ? results[2].value.price : results[2].value.buy;
            } else { fetchErrors.XPT = true; }

            if (results[3].status === 'fulfilled') {
                prices.xpd = results[3].value.price != null ? results[3].value.price : results[3].value.buy;
            } else { fetchErrors.XPD = true; }

            if (results[4].status === 'fulfilled') {
                prices.rate = results[4].value.rates.CNY;
            } else { fetchErrors.Rate = true; }
        } catch (e) {
            fetchErrors.Network = true;
            ok = false;
        }

        render();

        const now = new Date();
        const timeStr = now.toLocaleString('zh-CN', { hour12: false });
        const statusEl = document.getElementById('timeInfo');
        const errs = Object.keys(fetchErrors);
        if (errs.length === 0) {
            statusEl.textContent = timeStr + ' | 实时';
        } else {
            statusEl.textContent = timeStr + ' | ' + errs.join('/') + ' 异常';
        }

        // 调试信息
        const debugParts = [];
        if (prices.xau != null) debugParts.push('XAU=' + prices.xau.toFixed(2));
        if (prices.xag != null) debugParts.push('XAG=' + prices.xag.toFixed(3));
        if (prices.rate != null) debugParts.push('USD/CNY=' + prices.rate.toFixed(4));
        const snap = rongtongSnapshot.prices['黄金9999'];
        const delta = prices.xau != null ? ((prices.xau - rongtongSnapshot.xau) * (prices.rate || rongtongSnapshot.rate) / OZ_TO_G) : 0;
        debugParts.push('黄金基准=' + snap.buy.toFixed(2) + ' 变动=' + (delta >= 0 ? '+' : '') + delta.toFixed(2) + ' 回购-15销售+10');
        document.getElementById('debugInfo').textContent = debugParts.join('  |  ');
    }

    // 启动
    render();
    mainLoop();
    setInterval(mainLoop, 3000);
    </script>
</body>
</html>
