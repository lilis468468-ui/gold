<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>融通金 - 贵金属行情</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
            background: #1f1f1f;
            color: #fff;
            min-height: 100vh;
            font-size: 14px;
        }
        /* 顶部 LOGO 栏 */
        .top-bar {
            background: #1a1a1a;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 42px;
            height: 42px;
            border: 2px solid #d4a84b;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4a84b;
            font-size: 22px;
            font-weight: bold;
        }
        .logo-name {
            font-size: 22px;
            color: #d4a84b;
            font-weight: bold;
            letter-spacing: 2px;
        }
        .logo-en {
            font-size: 11px;
            color: #d4a84b;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .qr-code {
            width: 80px;
            height: 80px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 11px;
        }
        /* 状态栏 */
        .status-line {
            background: #1a1a1a;
            padding: 10px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .time-info { color: #ff4d4d; font-weight: 500; }
        .time-info .ok { color: #00cc66; }
        /* 表格 */
        .grid {
            width: 100%;
        }
        .row {
            display: grid;
            grid-template-columns: 2fr 1.5fr 1.5fr 1.5fr;
            padding: 14px 20px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
        }
        .row.head {
            background: #1a1a1a;
            font-size: 15px;
            font-weight: bold;
            padding: 16px 20px;
        }
        .row.head > div { color: #fff; }
        .pname { color: #d4a84b; font-size: 17px; font-weight: 500; text-align: left; padding-left: 10px; }
        .pval { font-size: 17px; font-weight: 500; }
        .up { color: #ff4d4d; }
        .down { color: #22c55e; }
        .hint {
            color: #888;
            padding: 16px 20px;
            text-align: center;
            font-size: 13px;
            background: #1a1a1a;
        }
        .debug {
            color: #666;
            padding: 10px 20px 24px;
            font-size: 11px;
            line-height: 1.8;
            background: #1a1a1a;
            border-top: 1px solid #2a2a2a;
        }
        @media (max-width: 480px) {
            .pname, .pval { font-size: 15px; }
            .row { padding: 12px 8px; }
            .row.head { padding: 14px 8px; }
            .logo-name { font-size: 18px; }
            .logo-icon { width: 34px; height: 34px; font-size: 16px; }
            .qr-code { width: 60px; height: 60px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="logo">
            <div class="logo-icon">金</div>
            <div>
                <div class="logo-name">融通金</div>
                <div class="logo-en">RONGTONG GOLD</div>
            </div>
        </div>
        <div class="qr-code">二维码</div>
    </div>
    <div class="status-line">
        <span></span>
        <span class="time-info" id="timeInfo">加载中...</span>
    </div>
    <div class="grid">
        <div class="row head"><div>商品</div><div>回购</div><div>销售</div><div>高/低</div></div>
        <div id="dataContainer"></div>
    </div>
    <div class="hint">数据来源: 融通金基准 + 国际金价实时校准</div>
    <div class="debug" id="debugInfo"></div>

    <script>
    const OZ_TO_G = 31.1034768;

    let rongtongSnapshot = {
        xau: 4332.40,
        xag: 70.13,
        xpt: 1798.65,
        xpd: 1351.73,
        rate: 6.77,
        prices: {
            '黄金9999': { buy: 940.66, sell: 941.18 },
            '黄金T+D': { buy: 940.23, sell: 940.41 },
            '黄 金':  { buy: 938.03, sell: 940.03 },
            '白 银':  { buy: 15.509, sell: 15.609 },
            '铂 金':  { buy: 384.60, sell: 386.10 },
            '钯 金':  { buy: 291.30, sell: 292.80 },
            '铑金':   { buy: 1450.00, sell: 1450.00 },
            '铱':     { buy: 1100.0, sell: 1100.0 },
            '钌':     { buy: 240.0,  sell: 240.0 },
            '白银T+D':{ buy: 16759,  sell: 16766 },
            '铂金9995':{ buy: 445.00, sell: 448.20 },
            '美黄金': { buy: 4351.10, sell: 4351.50 },
            '美铂金': { buy: 1808.0, sell: 1808.5 },
            '美钯金': { buy: 1356.0, sell: 1357.0 },
            '美白银': { buy: 70.250, sell: 70.280 },
            '美铑金': { buy: 7800.00, sell: 7800.00 },
            '伦敦金': { buy: 4339.31, sell: 4339.66 },
            '伦敦银': { buy: 70.130, sell: 70.189 },
            '伦敦铂': { buy: 1809.45, sell: 1815.45 },
            '伦敦钯': { buy: 1354.50, sell: 1363.00 },
            '美元':   { buy: 675.71, sell: 675.76 }
        }
    };

    const products = [
        { name: '黄金9999', metal: 'gold', decimals: 2 },
        { name: '黄金T+D', metal: 'gold', decimals: 2 },
        { name: '黄 金', metal: 'gold', decimals: 2 },
        { name: '白 银', metal: 'silver', decimals: 3 },
        { name: '铂 金', metal: 'platinum', decimals: 2 },
        { name: '钯 金', metal: 'palladium', decimals: 2 },
        { name: '铑金', metal: 'gold', decimals: 2 },
        { name: '铱', metal: 'gold', decimals: 1 },
        { name: '钌', metal: 'gold', decimals: 1 },
        { name: '白银T+D', metal: 'silver', decimals: 0 },
        { name: '铂金9995', metal: 'platinum', decimals: 2 },
        { name: '美黄金', metal: 'gold', decimals: 2, unit: 'oz' },
        { name: '美铂金', metal: 'platinum', decimals: 1, unit: 'oz' },
        { name: '美钯金', metal: 'palladium', decimals: 1, unit: 'oz' },
        { name: '美白银', metal: 'silver', decimals: 3, unit: 'oz' },
        { name: '美铑金', metal: 'gold', decimals: 2 },
        { name: '伦敦金', metal: 'gold', decimals: 2, unit: 'oz' },
        { name: '伦敦银', metal: 'silver', decimals: 3, unit: 'oz' },
        { name: '伦敦铂', metal: 'platinum', decimals: 2, unit: 'oz' },
        { name: '伦敦钯', metal: 'palladium', decimals: 2, unit: 'oz' },
        { name: '美元', metal: 'rate', decimals: 2 }
    ];

    let prices = { xau: null, xag: null, xpt: null, xpd: null, rate: null };
    let lastPrices = {};
    let lastUpdate = null;
    let errorLog = [];

    function calcPrice(product) {
        const snap = rongtongSnapshot.prices[product.name];
        if (!snap) return { buy: null, sell: null };

        // 国际商品: oz 单位, 直接用当前 XAU/XAG/XPT/XPD
        if (product.unit === 'oz') {
            let m;
            if (product.metal === 'gold') m = prices.xau;
            else if (product.metal === 'silver') m = prices.xag;
            else if (product.metal === 'platinum') m = prices.xpt;
            else if (product.metal === 'palladium') m = prices.xpd;
            if (!m) return { buy: snap.buy, sell: snap.sell };
            return { buy: m, sell: m };
        }

        // 美元
        if (product.metal === 'rate' || product.name === '美元') {
            const r = prices.rate || rongtongSnapshot.rate;
            return { buy: r * 100 - 1.5, sell: r * 100 + 1.5 };
        }

        // 常量商品 (铑/铱/钌/美铑) 不受国际价波动影响
        if (product.name === '铑金' || product.name === '铱' || product.name === '钌' || product.name === '美铑金') {
            return { buy: snap.buy, sell: snap.sell };
        }

        // 国内商品: 融通金基准 + 国际价变动
        let metalNow, metalSnap;
        if (product.metal === 'gold') { metalNow = prices.xau; metalSnap = rongtongSnapshot.xau; }
        else if (product.metal === 'silver') { metalNow = prices.xag; metalSnap = rongtongSnapshot.xag; }
        else if (product.metal === 'platinum') { metalNow = prices.xpt; metalSnap = rongtongSnapshot.xpt; }
        else if (product.metal === 'palladium') { metalNow = prices.xpd; metalSnap = rongtongSnapshot.xpd; }

        if (!metalNow) return { buy: snap.buy, sell: snap.sell };

        const rateNow = prices.rate || rongtongSnapshot.rate;
        const delta = (metalNow - metalSnap) * rateNow / OZ_TO_G;

        return { buy: snap.buy + delta, sell: snap.sell + delta };
    }

    function render() {
        const container = document.getElementById('dataContainer');
        let html = '';
        products.forEach(p => {
            const { buy, sell } = calcPrice(p);
            const key = p.name;
            const last = lastPrices[key];
            const bVal = buy != null ? buy.toFixed(p.decimals) : '--';
            const sVal = sell != null ? sell.toFixed(p.decimals) : '--';
            let bCls = '', sCls = '';
            if (last != null && buy != null && last.buy != null) {
                if (buy > last.buy + 0.001) bCls = 'up';
                else if (buy < last.buy - 0.001) bCls = 'down';
            }
            if (last != null && sell != null && last.sell != null) {
                if (sell > last.sell + 0.001) sCls = 'up';
                else if (sell < last.sell - 0.001) sCls = 'down';
            }
            const highLow = buy != null ? (bCls === 'up' ? `<span class="up">${bVal}</span>` : (bCls === 'down' ? `<span class="down">${bVal}</span>` : bVal)) : '--';
            html += '<div class="row"><div class="pname">' + p.name + '</div><div class="pval ' + bCls + '">' + bVal + '</div><div class="pval ' + sCls + '">' + sVal + '</div><div class="pval ' + bCls + '">' + bVal + '</div></div>';
            lastPrices[key] = { buy, sell };
        });
        container.innerHTML = html;
    }

    async function fetchJson(url) {
        const res = await fetch(url, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return await res.json();
    }

    async function mainLoop() {
        let ok = true;
        errorLog = [];
        try {
            const [xau, xag, xpt, xpd, rate] = await Promise.all([
                fetchJson('https://api.gold-api.com/price/XAU').then(d => d.price).catch(e => { errorLog.push('XAU'); return null; }),
                fetchJson('https://api.gold-api.com/price/XAG').then(d => d.price).catch(e => { errorLog.push('XAG'); return null; }),
                fetchJson('https://api.gold-api.com/price/XPT').then(d => d.price).catch(e => { errorLog.push('XPT'); return null; }),
                fetchJson('https://api.gold-api.com/price/XPD').then(d => d.price).catch(e => { errorLog.push('XPD'); return null; }),
                fetchJson('https://api.exchangerate-api.com/v4/latest/USD').then(d => d.rates.CNY).catch(e => { errorLog.push('汇率'); return null; })
            ]);
            if (xau != null) prices.xau = xau;
            if (xag != null) prices.xag = xag;
            if (xpt != null) prices.xpt = xpt;
            if (xpd != null) prices.xpd = xpd;
            if (rate != null) prices.rate = rate;
            if (!prices.xau || !prices.rate) ok = false;
            lastUpdate = new Date();
        } catch (e) {
            ok = false;
            errorLog.push(e.message);
        }

        render();

        const t = lastUpdate ? lastUpdate.toLocaleString('zh-CN', { hour12: false }) : '--';
        const status = document.getElementById('timeInfo');
        if (ok) {
            status.innerHTML = '<span>' + t + ' | 实时行情</span>';
        } else {
            status.innerHTML = '<span>' + t + ' | 连接中断</span>';
        }

        const xauNow = prices.xau || rongtongSnapshot.xau;
        const delta = ((xauNow - rongtongSnapshot.xau) * (prices.rate || 6.77) / OZ_TO_G).toFixed(2);
        const debug = 'XAU=' + xauNow.toFixed(2) + '$/oz | USD/CNY=' + (prices.rate || '?') + ' | 相对基准变动=' + (delta >= 0 ? '+' : '') + delta + '元/克' + (errorLog.length ? ' | 失败:' + errorLog.join(',') : '');
        document.getElementById('debugInfo').textContent = debug;
    }

    render();
    mainLoop();
    setInterval(mainLoop, 1000);
    </script>
</body>
</html>
